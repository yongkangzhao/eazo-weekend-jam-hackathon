name: Scaffold Demo

on:
  issues:
    types: [labeled]

jobs:
  scaffold:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Parse issue body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;
            const title = context.payload.issue.title.replace('[Idea] ', '').trim();

            // Extract demo name from form field
            const nameMatch = body.match(/### Demo Name\s*\n\s*(.+)/);
            const descMatch = body.match(/### Description\s*\n\s*([\s\S]*?)(?=\n###|$)/);
            const apisMatch = body.match(/### MiniMax APIs Used\s*\n\s*([\s\S]*?)(?=\n###|$)/);
            const authorMatch = body.match(/### Your Name \/ GitHub Handle\s*\n\s*(.+)/);

            const slug = (nameMatch?.[1] || title)
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-|-$/g, '');

            const description = (descMatch?.[1] || '').trim().split('\n')[0];
            const apis = (apisMatch?.[1] || '')
              .trim()
              .split('\n')
              .map(l => l.replace(/^-\s*/, '').trim())
              .filter(Boolean);
            const author = (authorMatch?.[1] || 'team').trim();

            core.setOutput('slug', slug);
            core.setOutput('title', nameMatch?.[1]?.trim() || title);
            core.setOutput('description', description);
            core.setOutput('apis', JSON.stringify(apis));
            core.setOutput('author', author);
            core.setOutput('issue_number', context.payload.issue.number);

      - name: Scaffold demo files
        run: |
          SLUG="${{ steps.parse.outputs.slug }}"
          TITLE="${{ steps.parse.outputs.title }}"
          DESC="${{ steps.parse.outputs.description }}"
          AUTHOR="${{ steps.parse.outputs.author }}"

          mkdir -p "src/app/demos/${SLUG}"

          cat > "src/app/demos/${SLUG}/page.tsx" << 'TEMPLATE'
          "use client";

          import { useState } from "react";

          export default function DemoPage() {
            return (
              <div className="max-w-2xl mx-auto">
                <a
                  href="/"
                  className="text-sm text-gray-400 hover:text-gray-200 mb-6 inline-block"
                >
                  &larr; Back to Gallery
                </a>
                <h1 className="text-2xl font-bold mb-2">TITLE_PLACEHOLDER</h1>
                <p className="text-gray-400 mb-6">DESC_PLACEHOLDER</p>

                {/* TODO: Build your demo UI here */}
                <div className="rounded-lg border-2 border-dashed border-gray-700 py-20 text-center text-gray-500">
                  Demo coming soon
                </div>
              </div>
            );
          }
          TEMPLATE

          sed -i "s/TITLE_PLACEHOLDER/${TITLE}/g" "src/app/demos/${SLUG}/page.tsx"
          sed -i "s/DESC_PLACEHOLDER/${DESC}/g" "src/app/demos/${SLUG}/page.tsx"

      - name: Register demo in config
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const slug = '${{ steps.parse.outputs.slug }}';
            const title = '${{ steps.parse.outputs.title }}';
            const desc = '${{ steps.parse.outputs.description }}';
            const apis = ${{ steps.parse.outputs.apis }};
            const author = '${{ steps.parse.outputs.author }}';

            let content = fs.readFileSync('src/demos.ts', 'utf8');

            const entry = `  {
                slug: "${slug}",
                title: "${title}",
                description: "${desc.replace(/"/g, '\\"')}",
                apis: ${JSON.stringify(apis)},
                author: "${author}",
                status: "wip",
              },`;

            content = content.replace(
              /^];/m,
              `${entry}\n];`
            );

            fs.writeFileSync('src/demos.ts', content);

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLUG="${{ steps.parse.outputs.slug }}"
          ISSUE="${{ steps.parse.outputs.issue_number }}"
          BRANCH="scaffold/${SLUG}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add -A
          git commit -m "scaffold: add ${SLUG} demo (closes #${ISSUE})"
          git push origin "${BRANCH}"

          gh pr create \
            --title "Add ${SLUG} demo" \
            --body "Scaffolded from #${ISSUE}. Ready for implementation." \
            --base main \
            --head "${BRANCH}"

      - name: Comment on issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLUG="${{ steps.parse.outputs.slug }}"
          ISSUE="${{ steps.parse.outputs.issue_number }}"
          gh issue comment "${ISSUE}" --body "Scaffolded! A PR has been created with the starter code for \`${SLUG}\`. Check the Pull Requests tab."
